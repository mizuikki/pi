name: Publish GitHub Packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (branch, tag, or SHA)"
        required: false
        type: string
      dry_run:
        description: "Validate packages without publishing"
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SOURCE_REF: ${{ github.event.inputs.ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event.inputs.dry_run || 'true' }}" == "true" ]]; then
            node scripts/publish.mjs --dry-run --registry https://npm.pkg.github.com
          else
            node scripts/publish.mjs --registry https://npm.pkg.github.com
          fi
